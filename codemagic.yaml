workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    scripts:

      - name: Flutter clean
        script: |
          flutter clean

      - name: Get packages
        script: |
          flutter pub get

      - name: Clean iOS Pods
        script: |
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          pod repo update
          pod install
          cd ..

      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/*.app