workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Flutter clean
        script: |
          flutter clean

      - name: Get packages
        script: |
          flutter pub get

      - name: Install pods
        script: |
          cd ios
          pod repo update
          pod install
          cd ..

      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/*.app