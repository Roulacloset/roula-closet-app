workflows:
ios-workflow:
name: iOS Build
max_build_duration: 60

```
environment:
  flutter: stable
  xcode: latest

scripts:
  - name: Flutter clean
    script: |
      flutter clean

  - name: Get Flutter packages
    script: |
      flutter pub get

  - name: Install CocoaPods
    script: |
      cd ios
      pod install
      cd ..

  - name: Build iOS (Simulator)
    script: |
      flutter build ios --release --simulator

artifacts:
  - build/ios/iphonesimulator/*.app
```
